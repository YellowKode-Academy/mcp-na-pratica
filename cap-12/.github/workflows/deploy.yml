# .github/workflows/deploy.yml
# Capitulo 12: CI/CD completo -- testes + build + deploy no Railway
# Disparado em: push na main (deploy completo) ou PR na main (so testes)
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run unit and integration tests
      env:
        JWT_SECRET: "chave_de_teste_ci_apenas"
        LOG_FORMAT: "console"
        LOG_LEVEL: "WARNING"
      run: pytest tests/test_tools.py tests/test_server.py -v --tb=short

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    # So executa em push na main, nao em PRs
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: market-intelligence-mcp:latest
        # Cache de layers do GitHub Actions para builds rapidos
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Railway
      uses: bervProject/railway-deploy@v1.0.0
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
        service: "market-intelligence-mcp"

    - name: Verify deployment health
      run: |
        echo "Aguardando servidor iniciar..."
        sleep 15
        curl --fail ${{ secrets.PRODUCTION_URL }}/health
